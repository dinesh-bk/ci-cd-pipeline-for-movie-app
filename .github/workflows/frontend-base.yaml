name: Frontend Base (Lint & Test)

on:
    workflow_call:

jobs:
    lint:
        name: Lint Frontend
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: starter/frontend
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Frontend Environment
              uses: ./.github/actions/frontend-setup

            - name: Run lint
              run: npm run lint

    test:
        name: Test Frontend
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: starter/frontend
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Frontend Environment
              uses: ./.github/actions/frontend-setup

            - name: Run tests
              run: CI=true npm test
