name: Frontend Continuous Integration

# Triggers for the workflow
on:
    # Manual trigger using the workflow_dispatch event
    workflow_dispatch:

    #Automatic trigger on pull request events to the main branch
    pull_request:
        branches:
            - main

jobs:
    frontend-lint-and-test:
        uses: ./.github/workflows/frontend-base.yaml

    build:
        name: Build Docker Image
        runs-on: ubuntu-latest
        needs: frontend-lint-and-test
        defaults:
            run:
                working-directory: starter/frontend
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Frontend Environment
              uses: ./.github/actions/frontend-setup

            - name: Build Docker image
              run: docker build --build-arg REACT_APP_MOVIE_API_URL=http://localhost:5000 -t mp-frontend:latest .
