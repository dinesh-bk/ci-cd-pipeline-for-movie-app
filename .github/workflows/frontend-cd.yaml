name: Frontend Continuous Deployment

# Triggers for the workflow
on:
    # Manual trigger using the workflow_dispatch event
    workflow_dispatch:

    # Automatic trigger on push events to the main branch
    # push:
    #     branches:
    #         - main

env:
    ECR_REPOSITORY: cicd-frontend-repo
jobs:
    frontend-lint-and-test:
        uses: ./.github/workflows/frontend-base.yaml

    build-and-deploy:
        name: Build and Deploy to EKS
        runs-on: ubuntu-latest
        needs: frontend-lint-and-test
        defaults:
            run:
                working-directory: starter/frontend
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Frontend Environment
              uses: ./.github/actions/frontend-setup

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
                  aws-region: ${{ secrets.AWS_REGION }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Build, Tag, and Push Docker image
              env:
                  ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                  IMAGE_TAG: ${{ github.sha }}
              run: |
                  docker build \
                    --build-arg REACT_APP_MOVIE_API_URL=${{ secrets.BACKEND_URL }} \
                    -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                    -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .

                  docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
                  docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

            - name: Update kubeconfig
              run: aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}

            - name: Deploy frontend to Kubernetes
              env:
                  ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                  IMAGE_TAG: ${{ github.sha }}
              run: |
                  kubectl apply -k ./k8s/ 
                  kubectl set image deployment/frontend frontend=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
                  kubectl rollout status deployment/frontend
